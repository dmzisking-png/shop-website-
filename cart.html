<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - DMZ Mart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
    </style>
</head>
<body class="bg-gray-50">

    <div class="max-w-5xl mx-auto px-4 py-10">
        <a href="index.html" class="flex items-center gap-2 text-orange-600 mb-10 hover:text-orange-700">
            <i class="fas fa-arrow-left"></i> Continue Shopping
        </a>

        <h1 class="text-4xl font-bold mb-10">Your Cart</h1>

        <div id="cartItems" class="space-y-6"></div>

        <div class="mt-12 bg-white p-8 rounded-3xl">
            <div class="flex justify-between text-3xl font-bold">
                <span>Total</span>
                <span id="total">₦0</span>
            </div>
            <button onclick="checkout()" class="mt-8 w-full bg-orange-600 hover:bg-orange-700 text-white py-5 rounded-3xl text-xl font-semibold">
                Proceed to Checkout
            </button>
        </div>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem('dmzCart')) || [];

        function renderCart() {
            const container = document.getElementById('cartItems');
            let total = 0;

            if (cart.length === 0) {
                container.innerHTML = `<p class="text-center text-gray-500 py-16">Your cart is empty</p>`;
                document.getElementById('total').textContent = '₦0';
                return;
            }

            container.innerHTML = cart.map((item, i) => {
                total += item.price * item.qty;
                return `
                    <div class="flex gap-6 bg-white p-6 rounded-3xl">
                        <img src="${item.img}" class="w-28 h-28 object-cover rounded-2xl">
                        <div class="flex-1">
                            <p class="font-medium">${item.name}</p>
                            <p class="text-orange-600 font-bold">₦${item.price.toLocaleString()}</p>
                            <div class="flex items-center gap-4 mt-4">
                                <button onclick="changeQty(${i},-1)" class="w-8 h-8 border rounded-xl">-</button>
                                <span>${item.qty}</span>
                                <button onclick="changeQty(${i},1)" class="w-8 h-8 border rounded-xl">+</button>
                            </div>
                        </div>
                        <button onclick="removeItem(${i})" class="text-red-500">×</button>
                    </div>
                `;
            }).join('');

            document.getElementById('total').textContent = `₦${total.toLocaleString()}`;
        }

        function changeQty(i, delta) {
            cart[i].qty += delta;
            if (cart[i].qty < 1) cart.splice(i,1);
            localStorage.setItem('dmzCart', JSON.stringify(cart));
            renderCart();
        }

        function removeItem(i) {
            cart.splice(i,1);
            localStorage.setItem('dmzCart', JSON.stringify(cart));
            renderCart();
        }

        function checkout() {
            alert("🎉 Order placed successfully!");
            localStorage.removeItem('dmzCart');
            cart = [];
            renderCart();
        }

        window.onload = renderCart;
    </script>
</body>
</html>
