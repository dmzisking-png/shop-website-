<!DOCTYPE html>
<html>
<head>
<title>Cart</title>

<style>
body{font-family:Arial;background:#f1f3f6;margin:0;}

.box{
max-width:700px;
margin:40px auto;
background:white;
padding:20px;
border-radius:15px;
}

.item{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #eee;
}

.total{
font-size:24px;
color:#00a86b;
margin-top:10px;
}

select,button{
width:100%;
padding:12px;
margin-top:10px;
}

button{
background:#111;
color:white;
border:none;
border-radius:25px;
}
</style>
</head>

<body>

<div class="box">

<h2>Your Cart</h2>

<div id="items"></div>

<div class="total" id="total"></div>

<h3>Payment Method</h3>
<select>
<option>Credit Card</option>
<option>Debit Card</option>
<option>BNPL (Buy Now Pay Later)</option>
</select>

<button onclick="pay()">Pay Now</button>

</div>

<script>
let cart=JSON.parse(localStorage.getItem("cart"))||[];
let box=document.getElementById("items");
let total=0;

cart.forEach(i=>{
box.innerHTML+=`
<div class="item">
<span>${i.name}</span>
<span>₦${i.price}</span>
</div>
`;
total+=Number(i.price);
});

document.getElementById("total").innerText="Total: ₦"+total;

function pay(){
alert("Payment gateway can be connected later (Paystack/Stripe)");
}
</script>

</body>
</html>
