<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - DMZ Mart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-50">

    <div class="max-w-5xl mx-auto px-4 py-10">
        <div class="flex justify-between items-center mb-10">
            <a href="index.html" class="flex items-center gap-2 text-orange-600 hover:text-orange-700 font-medium">
                <i class="fas fa-arrow-left"></i> Continue Shopping
            </a>
            <h1 class="text-4xl font-bold">Your Cart</h1>
        </div>

        <div id="cartItems" class="space-y-6 mb-12"></div>

        <div class="bg-white rounded-3xl p-8">
            <div class="flex justify-between text-3xl font-bold mb-8">
                <span>Total</span>
                <span id="cartTotal">₦0</span>
            </div>
            <button onclick="checkout()" 
                class="w-full bg-orange-600 hover:bg-orange-700 text-white py-5 rounded-3xl text-xl font-semibold">
                Proceed to Checkout
            </button>
        </div>
    </div>

    <script>
        // Load cart from localStorage (shared with index.html)
        let cart = JSON.parse(localStorage.getItem('dmzCart')) || [];

        function renderCart() {
            const container = document.getElementById('cartItems');
            let total = 0;

            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-20 text-gray-500">
                        <i class="fas fa-shopping-cart text-6xl mb-4"></i>
                        <p>Your cart is empty</p>
                    </div>`;
                document.getElementById('cartTotal').textContent = '₦0';
                return;
            }

            container.innerHTML = cart.map((item, index) => {
                total += item.price * item.qty;
                return `
                    <div class="flex gap-6 bg-white p-6 rounded-3xl">
                        <img src="${item.img}" class="w-28 h-28 object-cover rounded-2xl" alt="">
                        <div class="flex-1">
                            <h3 class="font-semibold text-lg">${item.name}</h3>
                            <p class="text-orange-600 font-bold">₦${item.price.toLocaleString()}</p>
                            <div class="flex items-center gap-4 mt-4">
                                <button onclick="changeQty(${index}, -1)" class="w-9 h-9 border rounded-2xl hover:bg-gray-100">-</button>
                                <span class="font-medium w-6 text-center">${item.qty}</span>
                                <button onclick="changeQty(${index}, 1)" class="w-9 h-9 border rounded-2xl hover:bg-gray-100">+</button>
                            </div>
                        </div>
                        <button onclick="removeItem(${index})" class="text-red-500 text-3xl mt-2">×</button>
                    </div>
                `;
            }).join('');

            document.getElementById('cartTotal').textContent = `₦${total.toLocaleString()}`;
        }

        function changeQty(index, delta) {
            cart[index].qty += delta;
            if (cart[index].qty < 1) cart.splice(index, 1);
            localStorage.setItem('dmzCart', JSON.stringify(cart));
            renderCart();
        }

        function removeItem(index) {
            cart.splice(index, 1);
            localStorage.setItem('dmzCart', JSON.stringify(cart));
            renderCart();
        }

        function checkout() {
            if (cart.length === 0) return alert("Your cart is empty");
            alert("🎉 Thank you for shopping at DMZ Mart!\nYour order has been placed.");
            localStorage.removeItem('dmzCart');
            cart = [];
            renderCart();
        }

        // Initialize
        window.onload = renderCart;
    </script>
</body>
</html>
