<!DOCTYPE html>
<html>
<head>
<title>Cart</title>

<style>
body{
font-family:Arial;
background:#f1f3f6;
margin:0;
}

.box{
max-width:700px;
margin:30px auto;
background:white;
padding:20px;
border-radius:12px;
}

.item{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #eee;
}

button{
width:100%;
padding:12px;
background:#111;
color:white;
border:none;
border-radius:20px;
margin-top:10px;
cursor:pointer;
}

button:hover{
background:#00a86b;
}

.total{
font-size:22px;
margin-top:10px;
color:#00a86b;
}
</style>
</head>

<body>

<div class="box">

<h2>Cart</h2>

<div id="items"></div>

<div class="total" id="total"></div>

<button onclick="checkout()">Checkout</button>

</div>

<script>
let cart=JSON.parse(localStorage.getItem("cart"))||[];
let box=document.getElementById("items");
let total=0;

cart.forEach((i)=>{
box.innerHTML+=`
<div class="item">
<span>${i.name} (${i.color}) x${i.qty}</span>
<span>₦${i.price*i.qty}</span>
</div>
`;
total+=i.price*i.qty;
});

document.getElementById("total").innerText="Total: ₦"+total;

function checkout(){
alert("Connect to WhatsApp or payment gateway later");
}
</script>

</body>
</html>
