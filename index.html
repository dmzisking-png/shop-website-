<!DOCTYPE html>
<html>
<head>
<title>DMZ Mart</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f4f6f8;
}

/* TOP NAV */
.nav{
background:#f68b1e;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
position:sticky;
top:0;
z-index:10;
}

.logo{
font-size:22px;
font-weight:bold;
}

.search{
flex:1;
margin:0 15px;
}

.search input{
width:100%;
padding:10px;
border:none;
border-radius:5px;
}

/* CATEGORY BAR */
.categories{
display:flex;
overflow-x:auto;
gap:10px;
padding:10px;
background:white;
}

.cat{
padding:10px 15px;
background:#eee;
border-radius:20px;
white-space:nowrap;
font-size:14px;
cursor:pointer;
}

/* BANNER */
.banner{
height:260px;
background:url('https://images.unsplash.com/photo-1607082349566-187342175e2f');
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:32px;
font-weight:bold;
text-align:center;
}

/* SECTION */
.section-title{
padding:15px;
font-size:18px;
font-weight:bold;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:white;
border-radius:8px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
transition:0.2s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.card h3{
font-size:14px;
margin:8px;
}

.price{
color:green;
font-weight:bold;
margin:0 8px 10px;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<div class="logo">DMZ</div>

<div class="search">
<input type="text" placeholder="Search products...">
</div>

<div>🛒</div>
</div>

<!-- CATEGORIES -->
<div class="categories">
<div class="cat">Phones</div>
<div class="cat">Laptops</div>
<div class="cat">TVs</div>
<div class="cat">Gaming</div>
<div class="cat">Fashion</div>
<div class="cat">Home</div>
</div>

<!-- BANNER -->
<div class="banner">
Mega Deals • Up to 70% Off
</div>

<!-- FLASH SALES -->
<div class="section-title">Flash Sales</div>
<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">
<h3>iPhone 15 Pro</h3>
<div class="price">₦1,200,000</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8">
<h3>MacBook Pro</h3>
<div class="price">₦1,800,000</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1606813907291-d86efa9b94db">
<h3>PlayStation 5</h3>
<div class="price">₦750,000</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1585386959984-a41552231693">
<h3>AirPods Pro</h3>
<div class="price">₦180,000</div>
</div>

</div>

</body>
</html>
