<!DOCTYPE html>
<html>
<head>
    <title>DMZ Couture</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0a0a0a;
            color: white;
        }

        /* HERO */
        .hero {
            height: 90vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)),
            url('https://images.unsplash.com/photo-1520975922203-b3f7c3f4f1f1?auto=format&fit=crop&w=1400&q=80');
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero h1 {
            font-size: 55px;
            letter-spacing: 4px;
        }

        .hero p {
            color: #aaa;
            margin-top: 10px;
        }

        .btn {
            margin-top: 20px;
            padding: 12px 25px;
            border: none;
            background: white;
            color: black;
            cursor: pointer;
        }

        /* SECTION */
        .section {
            padding: 50px 20px;
            text-align: center;
        }

        .section h2 {
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        /* PRODUCTS GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            padding: 20px;
        }

        .card {
            background: #151515;
            padding: 20px;
            border-radius: 12px;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
            background: #222;
        }

        a {
            text-decoration: none;
            color: white;
        }

        .price {
            color: #00ff99;
            margin-top: 5px;
        }
    </style>
</head>

<body>

<div class="hero">
    <h1>DMZ COUTURE</h1>
    <p>Luxury Streetwear • Limited Drops • Premium Fashion</p>
    <button class="btn">Shop Latest Drop</button>
</div>

<div class="section">
    <h2>🔥 NEW DROP</h2>

    <div class="grid">

        <a href="hoodie.html">
            <div class="card">
                <h3>Luxury Hoodie</h3>
                <p class="price">₦25,000</p>
            </div>
        </a>

        <a href="tee.html">
            <div class="card">
                <h3>Street Tee</h3>
                <p class="price">₦10,000</p>
            </div>
        </a>

        <a href="cap.html">
            <div class="card">
                <h3>Designer Cap</h3>
                <p class="price">₦7,000</p>
            </div>
        </a>

        <a href="jeans.html">
            <div class="card">
                <h3>Premium Jeans</h3>
                <p class="price">₦18,000</p>
            </div>
        </a>

        <a href="jacket.html">
            <div class="card">
                <h3>DMZ Jacket</h3>
                <p class="price">₦40,000</p>
            </div>
        </a>

    </div>
</div>

</body>
</html>
