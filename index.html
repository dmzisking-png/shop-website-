<!DOCTYPE html>
<html>
<head>
<title>DMZ Mart Pro</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f4f6f8;
}

/* TOP BAR */
.nav{
background:#f68b1e;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:22px 30px;
position:sticky;
top:0;
z-index:10;
}

.logo{
font-size:32px; /* 🔥 BIGGER */
font-weight:bold;
}

.search{
flex:1;
margin:0 30px;
}

.search input{
width:100%;
padding:18px;
font-size:18px;
border:none;
border-radius:8px;
}

/* CATEGORY BAR */
.categories{
display:flex;
gap:12px;
overflow-x:auto;
padding:18px 30px;
background:white;
}

.cat{
padding:16px 26px;
background:#eee;
border-radius:35px;
font-size:18px;
white-space:nowrap;
cursor:pointer;
transition:0.3s;
}

.cat:hover{
background:#f68b1e;
color:white;
transform:scale(1.05);
}

/* HERO */
.banner{
height:460px;
background:url('https://images.unsplash.com/photo-1607082349566-187342175e2f');
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:60px;
font-weight:bold;
text-align:center;
}

/* SECTION TITLE */
.section-title{
padding:30px 40px;
font-size:34px; /* 🔥 BIG TEXT */
font-weight:bold;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:30px;
padding:20px 40px 70px;
}

/* CARD */
.card{
background:white;
border-radius:18px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:430px;
object-fit:cover;
}

.card h3{
margin:15px;
font-size:28px; /* 🔥 BIG FONT */
}

.price{
margin:0 15px 20px;
font-size:24px;
font-weight:bold;
color:#00a86b;
}

/* SERIES LABEL */
.series{
margin:0 15px 10px;
font-size:16px;
color:#777;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<div class="logo">DMZ MART</div>

<div class="search">
<input placeholder="Search phones, laptops, gaming, appliances...">
</div>

<div style="font-size:22px;">🛒 Cart</div>
</div>

<!-- CATEGORY -->
<div class="categories">
<div class="cat" onclick="filter('all')">All</div>
<div class="cat" onclick="filter('iphone')">iPhone Series</div>
<div class="cat" onclick="filter('samsung')">Samsung Series</div>
<div class="cat" onclick="filter('laptop')">Laptops</div>
<div class="cat" onclick="filter('gaming')">Gaming</div>
<div class="cat" onclick="filter('home')">Home</div>
<div class="cat" onclick="filter('audio')">Audio</div>
</div>

<!-- HERO -->
<div class="banner">
PREMIUM ELECTRONICS MARKETPLACE
</div>

<!-- PRODUCTS -->
<div class="section-title">🔥 Featured Products</div>
<div class="grid" id="products"></div>

<script>

const products = [

/* IPHONE SERIES */
{name:"iPhone 13 Pro",series:"iPhone Series",cat:"iphone",price:750000,img:"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9"},
{name:"iPhone 14 Pro",series:"iPhone Series",cat:"iphone",price:950000,img:"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9"},
{name:"iPhone 15 Pro Max",series:"iPhone Series",cat:"iphone",price:1350000,img:"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9"},

/* SAMSUNG SERIES */
{name:"Samsung S22",series:"Samsung Series",cat:"samsung",price:600000,img:"https://images.unsplash.com/photo-1512499617640-c2f999098c3a"},
{name:"Samsung S23 Ultra",series:"Samsung Series",cat:"samsung",price:900000,img:"https://images.unsplash.com/photo-1512499617640-c2f999098c3a"},
{name:"Samsung S24 Ultra",series:"Samsung Series",cat:"samsung",price:1100000,img:"https://images.unsplash.com/photo-1512499617640-c2f999098c3a"},

/* LAPTOPS */
{name:"MacBook Air M2",series:"Laptop",cat:"laptop",price:1200000,img:"https://images.unsplash.com/photo-1517336714731-489689fd1ca8"},
{name:"Dell XPS 15",series:"Laptop",cat:"laptop",price:1300000,img:"https://images.unsplash.com/photo-1496181133206-80ce9b88a853"},

/* GAMING */
{name:"PlayStation 5",series:"Gaming Console",cat:"gaming",price:750000,img:"https://images.unsplash.com/photo-1606813907291-d86efa9b94db"},
{name:"Xbox Series X",series:"Gaming Console",cat:"gaming",price:720000,img:"https://images.unsplash.com/photo-1621259182978-fbf93132d53d"},

/* HOME */
{name:"Smart Fridge",series:"Home Appliance",cat:"home",price:900000,img:"https://images.unsplash.com/photo-1585238342028-4c7f3b2c8b12"},

/* AUDIO */
{name:"AirPods Pro",series:"Audio",cat:"audio",price:180000,img:"https://images.unsplash.com/photo-1585386959984-a41552231693"}

];

let box=document.getElementById("products");

function render(list){
box.innerHTML="";
list.forEach(p=>{
box.innerHTML+=`
<div class="card">
<img src="${p.img}">
<div class="series">${p.series}</div>
<h3>${p.name}</h3>
<div class="price">₦${p.price}</div>
</div>
`;
});
}

render(products);

/* FILTER SYSTEM */
function filter(cat){
if(cat==="all"){
render(products);
}else{
render(products.filter(p=>p.cat===cat));
}
}

</script>

</body>
</html>
