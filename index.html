<!DOCTYPE html>
<html>
<head>
<title>DMZ Mart Pro</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f1f3f6;
}

/* TOP BAR */
.topbar{
background:#111;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 25px;
position:sticky;
top:0;
z-index:10;
}

.logo{
color:#00ff99;
font-size:26px;
font-weight:bold;
}

/* CART BUTTON (MOVED + STYLED) */
.cart{
background:#00ff99;
color:#111;
padding:10px 16px;
border-radius:25px;
font-weight:bold;
font-size:16px;
}

/* HERO / PROMO BANNER SLIDER */
.banner{
height:320px;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
font-size:45px;
font-weight:bold;
background-size:cover;
background-position:center;
animation:slide 12s infinite;
}

/* BANNER ANIMATION */
@keyframes slide{
0%{background-image:url('https://images.unsplash.com/photo-1607082349566-187342175e2f');}
33%{background-image:url('https://images.unsplash.com/photo-1510557880182-3d4d3cba35a5');}
66%{background-image:url('https://images.unsplash.com/photo-1518770660439-4636190af475');}
100%{background-image:url('https://images.unsplash.com/photo-1607082349566-187342175e2f');}
}

/* CATEGORY BAR */
.catbar{
display:flex;
gap:12px;
overflow-x:auto;
background:white;
padding:15px;
}

.cat{
padding:12px 18px;
background:#eee;
border-radius:25px;
font-size:18px;
white-space:nowrap;
}

/* PRODUCT GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
padding:25px;
}

/* PRODUCT CARD */
.card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 8px 25px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-10px);
}

.card img{
width:100%;
height:340px;
object-fit:cover;
}

.card h3{
margin:14px;
font-size:20px;
}

.price{
margin:0 14px 18px;
color:#00a86b;
font-size:20px;
font-weight:bold;
}

a{
text-decoration:none;
color:black;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
<div class="logo">DMZ MART</div>
<a href="cart.html" class="cart">🛒 Cart</a>
</div>

<!-- PROMO BANNER -->
<div class="banner">
MEGA ELECTRONICS SALE • UP TO 70% OFF • LIMITED TIME
</div>

<!-- CATEGORY -->
<div class="catbar">
<div class="cat">Phones</div>
<div class="cat">Laptops</div>
<div class="cat">TVs</div>
<div class="cat">Gaming</div>
<div class="cat">Home Appliances</div>
<div class="cat">Accessories</div>
</div>

<!-- PRODUCTS -->
<div class="grid" id="products"></div>

<script>
const products = [
{name:"iPhone 15 Pro",price:1200000,img:"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9"},
{name:"Samsung S24 Ultra",price:1100000,img:"https://images.unsplash.com/photo-1512499617640-c2f999098c3a"},
{name:"MacBook Pro M3",price:1800000,img:"https://images.unsplash.com/photo-1517336714731-489689fd1ca8"},
{name:"Dell XPS 15",price:1300000,img:"https://images.unsplash.com/photo-1496181133206-80ce9b88a853"},
{name:"PlayStation 5",price:750000,img:"https://images.unsplash.com/photo-1606813907291-d86efa9b94db"},
{name:"Xbox Series X",price:720000,img:"https://images.unsplash.com/photo-1621259182978-fbf93132d53d"},
{name:"55 inch Smart TV",price:650000,img:"https://images.unsplash.com/photo-1593359677879-a4bb92f829d1"},
{name:"Washing Machine",price:480000,img:"https://images.unsplash.com/photo-1626806787461-102c1a1c8b2d"},
{name:"Apple Watch Ultra",price:350000,img:"https://images.unsplash.com/photo-1523275335684-37898b6baf30"},
{name:"AirPods Pro",price:180000,img:"https://images.unsplash.com/photo-1585386959984-a41552231693"}
];

let list=[...products,...products]; // more items

let box=document.getElementById("products");

list.forEach(p=>{
box.innerHTML+=`
<a href="product.html?name=${p.name}&price=${p.price}&img=${p.img}">
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<div class="price">₦${p.price}</div>
</div>
</a>
`;
});
</script>

</body>
</html>
