<!DOCTYPE html>
<html>
<head>
<title>DMZ Mart Pro</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f1f3f6;
}

/* TOP BAR */
.topbar{
background:#111;
color:white;
display:flex;
justify-content:space-between;
padding:18px 22px;
position:sticky;
top:0;
z-index:10;
}

.logo{
color:#00ff99;
font-size:22px;
font-weight:bold;
}

/* BIG BANNER SLIDER */
.banner{
height:300px;
background:url('https://images.unsplash.com/photo-1607082349566-187342175e2f');
background-size:cover;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:40px;
font-weight:bold;
text-align:center;
}

/* PRODUCT GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

/* CARD */
.card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:320px;
object-fit:cover;
}

.card h3{
margin:12px;
font-size:18px;
}

.price{
margin:0 12px 15px;
color:#00a86b;
font-size:18px;
font-weight:bold;
}

/* CATEGORY */
.catbar{
display:flex;
gap:10px;
overflow-x:auto;
padding:15px;
background:white;
}

.cat{
padding:10px 18px;
background:#eee;
border-radius:20px;
white-space:nowrap;
font-size:16px;
}
</style>
</head>

<body>

<div class="topbar">
<div class="logo">DMZ MART PRO</div>
<div><a href="cart.html" style="color:white;">🛒 Cart</a></div>
</div>

<div class="banner">
MEGA ELECTRONICS STORE • DEALS DAILY
</div>

<div class="catbar">
<div class="cat">Phones</div>
<div class="cat">Laptops</div>
<div class="cat">TVs</div>
<div class="cat">Gaming</div>
<div class="cat">Home Appliances</div>
</div>

<div class="grid" id="products"></div>

<script>
const products = [
{name:"iPhone 15 Pro",price:1200000,img:"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9"},
{name:"Samsung S24",price:1100000,img:"https://images.unsplash.com/photo-1512499617640-c2f999098c3a"},
{name:"MacBook Pro M3",price:1800000,img:"https://images.unsplash.com/photo-1517336714731-489689fd1ca8"},
{name:"Dell XPS 15",price:1300000,img:"https://images.unsplash.com/photo-1496181133206-80ce9b88a853"},
{name:"PlayStation 5",price:750000,img:"https://images.unsplash.com/photo-1606813907291-d86efa9b94db"},
{name:"Xbox Series X",price:720000,img:"https://images.unsplash.com/photo-1621259182978-fbf93132d53d"},
{name:"55 inch Smart TV",price:650000,img:"https://images.unsplash.com/photo-1593359677879-a4bb92f829d1"},
{name:"Washing Machine",price:480000,img:"https://images.unsplash.com/photo-1626806787461-102c1a1c8b2d"},
{name:"Apple Watch Ultra",price:350000,img:"https://images.unsplash.com/photo-1523275335684-37898b6baf30"},
{name:"AirPods Pro",price:180000,img:"https://images.unsplash.com/photo-1585386959984-a41552231693"}
];

// duplicate to simulate 50+ products
let list = [...products, ...products, ...products, ...products, ...products];

let box = document.getElementById("products");

list.forEach(p=>{
box.innerHTML += `
<a href="product.html?name=${p.name}&price=${p.price}&img=${p.img}">
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<div class="price">₦${p.price}</div>
</div>
</a>
`;
});
</script>

</body>
</html>
