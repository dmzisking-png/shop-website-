<!DOCTYPE html>
<html>
<head>
    <title>DMZ Couture</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f5f5f5;
        }

        /* HEADER */
        .header {
            background: black;
            color: white;
            padding: 15px;
            text-align: center;
            position: sticky;
            top: 0;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
        }

        .cart {
            position: absolute;
            right: 20px;
            top: 15px;
        }

        /* SEARCH */
        .search-box {
            padding: 10px;
            text-align: center;
            background: white;
        }

        input {
            width: 80%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        /* PRODUCTS */
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
        }

        .card img {
            width: 100%;
            border-radius: 10px;
        }

        .price {
            font-weight: bold;
            margin: 5px 0;
        }

        button {
            background: black;
            color: white;
            border: none;
            padding: 8px;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #333;
        }
    </style>
</head>

<body>

<div class="header">
    <div class="logo">DMZ Couture 👗</div>
    <div class="cart">🛒 Cart: <span id="cartCount">0</span></div>
</div>

<div class="search-box">
    <input type="text" id="search" onkeyup="searchProducts()" placeholder="Search products...">
</div>

<div class="products" id="productList">

    <div class="card">
        <img src="hoodie.jpg">
        <h3>Luxury Hoodie</h3>
        <p class="price">₦25,000</p>
        <button onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="card">
        <img src="tee.jpg">
        <h3>Streetwear Tee</h3>
        <p class="price">₦10,000</p>
        <button onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="card">
        <img src="cap.jpg">
        <h3>Designer Cap</h3>
        <p class="price">₦7,000</p>
        <button onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="card">
        <img src="jeans.jpg">
        <h3>Premium Jeans</h3>
        <p class="price">₦18,000</p>
        <button onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="card">
        <img src="jacket.jpg">
        <h3>DMZ Jacket</h3>
        <p class="price">₦40,000</p>
        <button onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="card">
        <img src="tracksuit.jpg">
        <h3>Street Tracksuit</h3>
        <p class="price">₦45,000</p>
        <button onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="card">
        <img src="polo.jpg">
        <h3>Luxury Polo</h3>
        <p class="price">₦15,000</p>
        <button onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="card">
        <img src="hoodie2.jpg">
        <h3>Oversized Hoodie</h3>
        <p class="price">₦30,000</p>
        <button onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="card">
        <img src="shirt.jpg">
        <h3>Classic Shirt</h3>
        <p class="price">₦12,000</p>
        <button onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="card">
        <img src="cargo.jpg">
        <h3>Street Cargo Pants</h3>
        <p class="price">₦22,000</p>
        <button onclick="addToCart()">Add to Cart</button>
    </div>

</div>

<script>
let cart = 0;

function addToCart() {
    cart++;
    document.getElementById("cartCount").innerText = cart;
}

function searchProducts() {
    let input = document.getElementById("search").value.toLowerCase();
    let cards = document.getElementsByClassName("card");

    for (let i = 0; i < cards.length; i++) {
        let title = cards[i].getElementsByTagName("h3")[0];
        if (title.innerText.toLowerCase().includes(input)) {
            cards[i].style.display = "";
        } else {
            cards[i].style.display = "none";
        }
    }
}
</script>

</body>
</html>
