<!DOCTYPE html>
<html>
<head>
<title>DMZ Couture</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f6f6f6;
color:#111;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:url('https://images.unsplash.com/photo-1520975922203-b3f7c3f4f1f1?auto=format&fit=crop&w=1600&q=80');
background-size:cover;
background-position:center;
position:relative;
}

.hero::after{
content:"";
position:absolute;
top:0;left:0;right:0;bottom:0;
background:rgba(255,255,255,0.75);
}

.hero-content{
position:relative;
}

.hero h1{
font-size:60px;
letter-spacing:5px;
}

.hero p{
color:#333;
}

/* HORIZONTAL SCROLL SECTION */
.section{
padding:60px 20px;
}

.title{
text-align:center;
font-size:28px;
margin-bottom:30px;
}

/* THIS IS THE IMPORTANT PART */
.scroll-row{
display:flex;
overflow-x:auto;
gap:20px;
padding:20px;
scroll-snap-type:x mandatory;
}

.scroll-row::-webkit-scrollbar{
display:none;
}

/* BIG LUXURY CARDS */
.card{
min-width:260px;
height:320px;
background:white;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
scroll-snap-align:start;
transition:0.4s;
font-size:18px;
}

.card:hover{
transform:scale(1.08);
box-shadow:0 20px 40px rgba(0,0,0,0.15);
}

a{
text-decoration:none;
color:#111;
}

.price{
color:#666;
margin-top:10px;
}
</style>
</head>

<body>

<div class="hero">
<div class="hero-content">
<h1>DMZ COUTURE</h1>
<p>Luxury Streetwear • Modern Fashion</p>
</div>
</div>

<div class="section">

<div class="title">FEATURED DROP → swipe</div>

<div class="scroll-row">

<a href="hoodie.html"><div class="card">Luxury Hoodie<br><div class="price">₦25,000</div></div></a>
<a href="tee.html"><div class="card">Street Tee<br><div class="price">₦10,000</div></div></a>
<a href="cap.html"><div class="card">Designer Cap<br><div class="price">₦7,000</div></div></a>
<a href="jeans.html"><div class="card">Premium Jeans<br><div class="price">₦18,000</div></div></a>
<a href="jacket.html"><div class="card">DMZ Jacket<br><div class="price">₦40,000</div></div></a>

<a href="hoodie.html"><div class="card">Oversized Hoodie<br><div class="price">₦30,000</div></div></a>
<a href="tee.html"><div class="card">Minimal Tee<br><div class="price">₦9,000</div></div></a>
<a href="jacket.html"><div class="card">Street Jacket<br><div class="price">₦38,000</div></div></a>

</div>

</div>

</body>
</html>
