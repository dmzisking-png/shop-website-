<!DOCTYPE html>
<html>
<head>
<title>DMZ Couture</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f0f0f,#1a1a1a,#101820);
color:white;
}

/* HERO */
.hero{
height:85vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.9)),
url('https://images.unsplash.com/photo-1520975922203-b3f7c3f4f1f1?auto=format&fit=crop&w=1400&q=80');
background-size:cover;
background-position:center;
}

.hero h1{
font-size:60px;
letter-spacing:5px;
}

.hero p{
color:#ccc;
}

/* GRID */
.section{
padding:50px 20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
}

/* GLASS CARDS */
.card{
background:rgba(255,255,255,0.06);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.1);
padding:18px;
border-radius:15px;
transition:0.4s;
}

.card:hover{
transform:translateY(-8px) scale(1.03);
background:rgba(255,255,255,0.12);
box-shadow:0 10px 30px rgba(0,255,150,0.15);
}

a{
text-decoration:none;
color:white;
}

.price{
color:#00ff99;
margin-top:5px;
}

/* BUTTON */
.btn{
margin-top:20px;
padding:12px 25px;
border:none;
background:linear-gradient(90deg,#00ff99,#00c2ff);
color:black;
font-weight:bold;
cursor:pointer;
border-radius:25px;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
}
</style>
</head>

<body>

<div class="hero">
<h1>DMZ COUTURE</h1>
<p>Luxury Streetwear • Modern Fashion • Limited Drops</p>
<button class="btn">Shop New Drop</button>
</div>

<div class="section">
<h2 style="text-align:center;">🔥 Featured Collection</h2>

<div class="grid">

<a href="hoodie.html"><div class="card"><h3>Luxury Hoodie</h3><p class="price">₦25,000</p></div></a>
<a href="tee.html"><div class="card"><h3>Street Tee</h3><p class="price">₦10,000</p></div></a>
<a href="cap.html"><div class="card"><h3>Designer Cap</h3><p class="price">₦7,000</p></div></a>
<a href="jeans.html"><div class="card"><h3>Premium Jeans</h3><p class="price">₦18,000</p></div></a>
<a href="jacket.html"><div class="card"><h3>DMZ Jacket</h3><p class="price">₦40,000</p></div></a>

<a href="hoodie.html"><div class="card"><h3>Oversized Hoodie</h3><p class="price">₦30,000</p></div></a>
<a href="tee.html"><div class="card"><h3>Minimal Tee</h3><p class="price">₦9,000</p></div></a>
<a href="jacket.html"><div class="card"><h3>Street Jacket</h3><p class="price">₦38,000</p></div></a>
<a href="jeans.html"><div class="card"><h3>Urban Jeans</h3><p class="price">₦20,000</p></div></a>

</div>
</div>

</body>
</html>
