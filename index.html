<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMZ Mart - Shop Everything Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        
        .hero-bg {
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://picsum.photos/id/1015/2000/800') center/cover;
        }
        .product-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .product-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="bg-gray-50">

    <!-- Top Bar & Header (same as before - shortened for space) -->
    <div class="bg-orange-600 text-white py-2 text-sm text-center">Free Delivery on Orders Over ₦50,000</div>
    
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 bg-orange-600 rounded-2xl flex items-center justify-center text-white text-4xl font-bold">D</div>
                <span class="text-3xl font-bold">DMZ<span class="text-orange-600">Mart</span></span>
            </div>
            
            <div class="flex-1 max-w-xl mx-8">
                <input type="text" id="searchInput" 
                       class="w-full border-2 border-gray-300 focus:border-orange-500 rounded-full py-3 px-6 outline-none"
                       placeholder="Search phones, sneakers, laptops...">
            </div>
            
            <div class="flex gap-8">
                <a onclick="showAccountModal()" class="cursor-pointer"><i class="fas fa-user text-2xl"></i></a>
                <a onclick="showOrders()" class="cursor-pointer"><i class="fas fa-box text-2xl"></i></a>
                <a onclick="toggleCart()" class="cursor-pointer relative">
                    <i class="fas fa-shopping-cart text-2xl"></i>
                    <span id="cartCount" class="absolute -top-1 -right-1 bg-red-500 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center">0</span>
                </a>
            </div>
        </div>
    </header>

    <!-- Hero -->
    <div class="hero-bg h-[500px] flex items-center text-white">
        <div class="max-w-7xl mx-auto px-4">
            <h1 class="text-5xl font-bold mb-4">Biggest Sale of the Year</h1>
            <p class="text-2xl">Up to 70% OFF on everything</p>
        </div>
    </div>

    <!-- Flash Deals -->
    <div id="flash-deals" class="max-w-7xl mx-auto px-4 py-12">
        <h2 class="text-3xl font-bold mb-8 flex items-center gap-3">🔥 Flash Sales</h2>
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-6" id="flash-products"></div>
    </div>

    <!-- All Sections -->
    <div class="max-w-7xl mx-auto px-4 space-y-16">
        <!-- Electronics -->
        <div id="electronics">
            <h2 class="text-3xl font-bold mb-8">Electronics</h2>
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-6" id="electronics-products"></div>
        </div>

        <!-- Phones -->
        <div id="phones">
            <h2 class="text-3xl font-bold mb-8">Phones & Tablets</h2>
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-6" id="phones-products"></div>
        </div>

        <!-- Computing -->
        <div id="computing">
            <h2 class="text-3xl font-bold mb-8">Laptops & Computing</h2>
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-6" id="computing-products"></div>
        </div>

        <!-- Fashion -->
        <div id="fashion">
            <h2 class="text-3xl font-bold mb-8">Fashion</h2>
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-6" id="fashion-products"></div>
        </div>

        <!-- Home -->
        <div id="home">
            <h2 class="text-3xl font-bold mb-8">Home & Kitchen</h2>
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-6" id="home-products"></div>
        </div>

        <!-- Beauty -->
        <div id="beauty">
            <h2 class="text-3xl font-bold mb-8">Beauty & Personal Care</h2>
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-6" id="beauty-products"></div>
        </div>
    </div>

    <!-- Cart, Modals, Footer (same as previous) -->
    <!-- ... (Cart sidebar, account modal, and footer code from previous version) ... -->

    <script>
        const productsDB = {
            flash: [
                {id:1, name:"Samsung Galaxy A35 5G", price:148000, old:195000, img:"https://picsum.photos/id/201/400/400", discount:"24%"},
                {id:2, name:"Sony WH-1000XM5 Headphones", price:265000, old:320000, img:"https://picsum.photos/id/180/400/400", discount:"17%"},
                {id:3, name:"Nike Dunk Low Sneakers", price:42500, old:68000, img:"https://picsum.photos/id/64/400/400", discount:"37%"},
                {id:4, name:"Infinix Hot 40i", price:92000, old:135000, img:"https://picsum.photos/id/201/400/400", discount:"32%"},
            ],
            electronics: [
                {id:5, name:"Samsung 55\" Crystal UHD TV", price:485000, img:"https://picsum.photos/id/201/400/400"},
                {id:6, name:"Sony Alpha Camera", price:425000, img:"https://picsum.photos/id/251/400/400"},
                {id:7, name:"JBL Flip 6 Speaker", price:85000, img:"https://picsum.photos/id/180/400/400"},
                {id:8, name:"Xiaomi Smart Watch", price:65000, img:"https://picsum.photos/id/133/400/400"},
                {id:9, name:"Anker 20,000mAh Powerbank", price:28500, img:"https://picsum.photos/id/201/400/400"},
            ],
            phones: [
                {id:10, name:"iPhone 15 Pro", price:985000, img:"https://picsum.photos/id/180/400/400"},
                {id:11, name:"Samsung Galaxy S24 Ultra", price:875000, img:"https://picsum.photos/id/201/400/400"},
                {id:12, name:"Google Pixel 8a", price:325000, img:"https://picsum.photos/id/251/400/400"},
                {id:13, name:"Tecno Spark 20 Pro", price:135000, img:"https://picsum.photos/id/201/400/400"},
            ],
            computing: [
                {id:14, name:"HP Pavilion Laptop", price:425000, img:"https://picsum.photos/id/251/400/400"},
                {id:15, name:"Lenovo IdeaPad", price:295000, img:"https://picsum.photos/id/180/400/400"},
                {id:16, name:"Dell Monitor 24 inch", price:145000, img:"https://picsum.photos/id/201/400/400"},
            ],
            fashion: [
                {id:17, name:"Nike Dunk Low", price:42500, img:"https://picsum.photos/id/64/400/400"},
                {id:18, name:"Adidas Samba Sneakers", price:38500, img:"https://picsum.photos/id/64/400/400"},
                {id:19, name:"Polo Ralph Lauren Shirt", price:28500, img:"https://picsum.photos/id/201/400/400"},
                {id:20, name:"Leather Jacket", price:125000, img:"https://picsum.photos/id/180/400/400"},
            ],
            home: [
                {id:21, name:"Hisense Washing Machine 7kg", price:285000, img:"https://picsum.photos/id/201/400/400"},
                {id:22, name:"LG Split Air Conditioner", price:425000, img:"https://picsum.photos/id/251/400/400"},
                {id:23, name:"Instant Pot 7-in-1", price:95000, img:"https://picsum.photos/id/180/400/400"},
            ],
            beauty: [
                {id:24, name:"L'Oréal Hair Treatment", price:8500, img:"https://picsum.photos/id/201/400/400"},
                {id:25, name:"Philips Hair Straightener", price:28500, img:"https://picsum.photos/id/251/400/400"},
                {id:26, name:"Neutrogena Face Wash", price:4500, img:"https://picsum.photos/id/180/400/400"},
            ]
        };

        // Render function (same as previous)
        function renderSection(containerId, items) {
            const container = document.getElementById(containerId);
            container.innerHTML = items.map(item => `
                <div class="product-card bg-white rounded-3xl overflow-hidden border">
                    <img src="${item.img}" class="w-full h-48 object-cover" alt="${item.name}">
                    <div class="p-4">
                        <p class="font-medium text-sm line-clamp-2">${item.name}</p>
                        <p class="text-xl font-bold mt-2">₦${item.price.toLocaleString()}</p>
                        <button onclick="addToCart(${item.id}, '${item.name}', ${item.price}, '${item.img}')" 
                                class="mt-4 w-full bg-orange-600 text-white py-3 rounded-2xl text-sm font-semibold">
                            Add to Cart
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function renderAll() {
            renderSection('flash-products', productsDB.flash);
            renderSection('electronics-products', productsDB.electronics);
            renderSection('phones-products', productsDB.phones);
            renderSection('computing-products', productsDB.computing);
            renderSection('fashion-products', productsDB.fashion);
            renderSection('home-products', productsDB.home);
            renderSection('beauty-products', productsDB.beauty);
        }

        // Cart functions (addToCart, toggleCart, etc.) - same as previous version
        let cart = [];
        function addToCart(id, name, price, img) {
            cart.push({id, name, price, img, qty:1});
            document.getElementById('cartCount').textContent = cart.length;
            alert(`${name} added to cart ✅`);
        }

        // Initialize
        window.onload = renderAll;
    </script>
</body>
</html>
