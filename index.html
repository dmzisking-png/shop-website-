<!DOCTYPE html>
<html>
<head>
<title>DMZ Mart</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f1f3f6;
}

/* TOP BAR */
.topbar{
background:#111;
color:white;
display:flex;
justify-content:space-between;
padding:18px 25px;
position:sticky;
top:0;
}

.logo{
font-size:22px;
font-weight:bold;
color:#00ff99;
}

/* HERO */
.hero{
height:65vh;
background:url('https://images.unsplash.com/photo-1607082349566-187342175e2f?auto=format&fit=crop&w=1600&q=80');
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
}

.hero h1{
font-size:55px;
background:rgba(0,0,0,0.5);
padding:20px;
border-radius:10px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
padding:25px;
}

/* BIG CARDS (BULKY LOOK) */
.card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 8px 25px rgba(0,0,0,0.15);
transition:0.3s;
}

.card:hover{
transform:translateY(-10px);
}

.card img{
width:100%;
height:320px;
object-fit:cover;
}

.card h3{
margin:12px;
font-size:18px;
}

.price{
margin:0 12px 15px;
color:#00a86b;
font-size:18px;
font-weight:bold;
}

/* CATEGORY BAR */
.catbar{
display:flex;
gap:10px;
overflow-x:auto;
padding:15px;
background:white;
}

.cat{
padding:10px 16px;
background:#eee;
border-radius:25px;
white-space:nowrap;
font-size:16px;
}
</style>
</head>

<body>

<div class="topbar">
<div class="logo">DMZ MART</div>
<a href="cart.html" style="color:white;font-size:18px;">🛒 Cart</a>
</div>

<div class="hero">
<h1>Everything You Need — Phones, Tech & More</h1>
</div>

<div class="catbar">
<div class="cat">Phones</div>
<div class="cat">Laptops</div>
<div class="cat">Audio</div>
<div class="cat">Accessories</div>
</div>

<div class="grid">

<!-- PRODUCT -->
<a href="product.html?name=iPhone 14 Pro&price=950000&img=https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">
<div class="card">
<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">
<h3>iPhone 14 Pro</h3>
<div class="price">₦950,000</div>
</div>
</a>

<a href="product.html?name=MacBook Pro&price=1500000&img=https://images.unsplash.com/photo-1517336714731-489689fd1ca8">
<div class="card">
<img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8">
<h3>MacBook Pro</h3>
<div class="price">₦1,500,000</div>
</div>
</a>

<a href="product.html?name=AirPods Pro&price=180000&img=https://images.unsplash.com/photo-1585386959984-a41552231693">
<div class="card">
<img src="https://images.unsplash.com/photo-1585386959984-a41552231693">
<h3>AirPods Pro</h3>
<div class="price">₦180,000</div>
</div>
</a>

<a href="product.html?name=Smart Watch&price=120000&img=https://images.unsplash.com/photo-1523275335684-37898b6baf30">
<div class="card">
<img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30">
<h3>Smart Watch</h3>
<div class="price">₦120,000</div>
</div>
</a>

</div>

</body>
</html>
