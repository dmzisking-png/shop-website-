<!DOCTYPE html>
<html>
<head>
<title>DMZ Mart</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

/* HEADER */
.header{
background:#111;
color:white;
padding:18px;
text-align:center;
font-size:22px;
font-weight:bold;
letter-spacing:3px;
}

/* HERO */
.hero{
height:50vh;
background:url('https://images.unsplash.com/photo-1550009158-9ebf69173e03?auto=format&fit=crop&w=1600&q=80');
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
position:relative;
}

.hero::after{
content:"";
position:absolute;
top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.5);
}

.hero h1{
position:relative;
color:white;
font-size:50px;
}

/* SEARCH */
.search{
text-align:center;
padding:20px;
}

.search input{
width:70%;
padding:12px;
border-radius:25px;
border:1px solid #ddd;
outline:none;
}

/* CATEGORY BAR */
.categories{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
padding:10px;
}

.cat{
padding:8px 15px;
background:white;
border-radius:20px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
font-size:14px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:30px;
}

/* CARD */
.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card h3{
margin:10px;
font-size:15px;
}

.price{
margin:0 10px 15px;
color:#00a86b;
font-weight:bold;
}
</style>
</head>

<body>

<div class="header">DMZ MART</div>

<div class="hero">
<h1>Everything You Need. One Store.</h1>
</div>

<div class="search">
<input type="text" placeholder="Search phones, electronics, accessories...">
</div>

<div class="categories">
<div class="cat">📱 Phones</div>
<div class="cat">🎧 Accessories</div>
<div class="cat">💻 Electronics</div>
<div class="cat">🔥 Deals</div>
</div>

<div class="grid">

<!-- PHONE -->
<div class="card">
<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?auto=format&fit=crop&w=800&q=80">
<h3>iPhone 14 Pro</h3>
<div class="price">₦950,000</div>
</div>

<!-- PHONE -->
<div class="card">
<img src="https://images.unsplash.com/photo-1512499617640-c2f999098c3a?auto=format&fit=crop&w=800&q=80">
<h3>Samsung Galaxy S23</h3>
<div class="price">₦820,000</div>
</div>

<!-- HEADPHONES -->
<div class="card">
<img src="https://images.unsplash.com/photo-1518441902117-f0a1c1c1c1c1?auto=format&fit=crop&w=800&q=80">
<h3>AirPods Pro</h3>
<div class="price">₦180,000</div>
</div>

<!-- LAPTOP -->
<div class="card">
<img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8?auto=format&fit=crop&w=800&q=80">
<h3>MacBook Pro</h3>
<div class="price">₦1,500,000</div>
</div>

<!-- SPEAKER -->
<div class="card">
<img src="https://images.unsplash.com/photo-1585386959984-a41552231693?auto=format&fit=crop&w=800&q=80">
<h3>Bluetooth Speaker</h3>
<div class="price">₦75,000</div>
</div>

<!-- WATCH -->
<div class="card">
<img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&w=800&q=80">
<h3>Smart Watch</h3>
<div class="price">₦120,000</div>
</div>

</div>

</body>
</html>
