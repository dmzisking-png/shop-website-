<!DOCTYPE html>
<html>
<head>
    <title>DMZ Couture</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0a0a0a;
            color: white;
        }

        /* HERO */
        .hero {
            height: 80vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)),
            url('https://images.unsplash.com/photo-1520975922203-b3f7c3f4f1f1?auto=format&fit=crop&w=1400&q=80');
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            animation: fadeIn 2s ease;
        }

        .hero h1 {
            font-size: 55px;
            letter-spacing: 4px;
            animation: slideDown 1s ease;
        }

        .hero p {
            color: #aaa;
            animation: fadeIn 3s ease;
        }

        /* BUTTON */
        .btn {
            margin-top: 20px;
            padding: 12px 25px;
            background: white;
            color: black;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.1);
            background: #00ff99;
        }

        /* GRID */
        .section {
            padding: 40px 20px;
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 12px;
        }

        .card {
            background: #151515;
            padding: 15px;
            border-radius: 12px;
            transition: 0.3s;
            opacity: 0;
            animation: popUp 0.6s forwards;
        }

        .card:hover {
            transform: scale(1.08);
            background: #222;
        }

        a {
            text-decoration: none;
            color: white;
        }

        .price {
            color: #00ff99;
        }

        /* ANIMATIONS */
        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }

        @keyframes slideDown {
            from {transform: translateY(-40px); opacity: 0;}
            to {transform: translateY(0); opacity: 1;}
        }

        @keyframes popUp {
            from {transform: scale(0.8); opacity: 0;}
            to {transform: scale(1); opacity: 1;}
        }
    </style>
</head>

<body>

<div class="hero">
    <h1>DMZ COUTURE</h1>
    <p>Luxury Streetwear • Limited Drops • Premium Fashion</p>
    <button class="btn">Shop Latest Drop</button>
</div>

<div class="section">
    <h2>🔥 Featured Drop</h2>

    <div class="grid">

        <a href="hoodie.html"><div class="card"><h3>Luxury Hoodie</h3><p class="price">₦25,000</p></div></a>
        <a href="tee.html"><div class="card"><h3>Street Tee</h3><p class="price">₦10,000</p></div></a>
        <a href="cap.html"><div class="card"><h3>Designer Cap</h3><p class="price">₦7,000</p></div></a>
        <a href="jeans.html"><div class="card"><h3>Premium Jeans</h3><p class="price">₦18,000</p></div></a>
        <a href="jacket.html"><div class="card"><h3>DMZ Jacket</h3><p class="price">₦40,000</p></div></a>

    </div>
</div>

</body>
</html>
