<!DOCTYPE html>
<html>
<head>
<title>DMZ Mart</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f1f3f6;
}

/* TOP BAR */
.topbar{
background:#111;
color:white;
display:flex;
justify-content:space-between;
padding:15px 20px;
position:sticky;
top:0;
}

.logo{
color:#00ff99;
font-weight:bold;
}

/* BANNER */
.banner{
background:url('https://images.unsplash.com/photo-1607082349566-187342175e2f?auto=format&fit=crop&w=1600&q=80');
height:200px;
background-size:cover;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:30px;
font-weight:bold;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:10px;
padding:10px;
}

/* CARD */
.card{
background:white;
border-radius:8px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
transition:0.2s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card h4{
margin:8px;
font-size:14px;
}

.price{
margin:0 8px 10px;
color:#00a86b;
font-weight:bold;
font-size:14px;
}

a{
text-decoration:none;
color:black;
}
</style>
</head>

<body>
