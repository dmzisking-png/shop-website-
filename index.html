<!DOCTYPE html>
<html>
<head>
<title>DMZ Mart</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

/* HEADER */
.header{
background:#111;
color:white;
padding:18px;
text-align:center;
font-size:22px;
font-weight:bold;
letter-spacing:3px;
}

/* HERO */
.hero{
height:45vh;
background:url('https://images.unsplash.com/photo-1550009158-9ebf69173e03?auto=format&fit=crop&w=1600&q=80');
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
position:relative;
}

.hero::after{
content:"";
position:absolute;
top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.5);
}

.hero h1{
position:relative;
color:white;
font-size:40px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:25px;
}

/* CARD */
.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
transition:0.3s;
text-align:center;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card h3{
margin:10px 0 5px;
}

.card p{
color:#00a86b;
font-weight:bold;
margin-bottom:15px;
text-decoration:none;
}

a{
text-decoration:none;
color:black;
}
</style>
</head>

<body>

<div class="header">DMZ MART</div>

<div class="hero">
<h1>Shop Phones, Fashion & Electronics</h1>
</div>

<div class="grid">

<!-- PRODUCT 1 -->
<a href="product.html?name=iPhone 14 Pro&price=950000&img=https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">
<div class="card">
<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">
<h3>iPhone 14 Pro</h3>
<p>₦950,000</p>
</div>
</a>

<!-- PRODUCT 2 -->
<a href="product.html?name=Samsung S23&price=820000&img=https://images.unsplash.com/photo-1512499617640-c2f999098c3a">
<div class="card">
<img src="https://images.unsplash.com/photo-1512499617640-c2f999098c3a">
<h3>Samsung S23</h3>
<p>₦820,000</p>
</div>
</a>

<!-- PRODUCT 3 -->
<a href="product.html?name=AirPods Pro&price=180000&img=https://images.unsplash.com/photo-1585386959984-a41552231693">
<div class="card">
<img src="https://images.unsplash.com/photo-1585386959984-a41552231693">
<h3>AirPods Pro</h3>
<p>₦180,000</p>
</div>
</a>

<!-- PRODUCT 4 -->
<a href="product.html?name=MacBook Pro&price=1500000&img=https://images.unsplash.com/photo-1517336714731-489689fd1ca8">
<div class="card">
<img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8">
<h3>MacBook Pro</h3>
<p>₦1,500,000</p>
</div>
</a>

<!-- PRODUCT 5 -->
<a href="product.html?name=Smart Watch&price=120000&img=https://images.unsplash.com/photo-1523275335684-37898b6baf30">
<div class="card">
<img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30">
<h3>Smart Watch</h3>
<p>₦120,000</p>
</div>
</a>

</div>

</body>
</html>
