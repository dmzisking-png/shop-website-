<!DOCTYPE html>
<html>
<head>
    <title>DMZ Couture</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f0f0f;
            color: white;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: black;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .cart {
            cursor: pointer;
        }

        /* HERO */
        .hero {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(90deg, #111, #222);
        }

        /* SEARCH */
        .search {
            text-align: center;
            padding: 15px;
        }

        input {
            width: 80%;
            padding: 12px;
            border-radius: 8px;
            border: none;
        }

        /* PRODUCTS */
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            padding: 20px;
        }

        .card {
            background: #1a1a1a;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
            background: #2a2a2a;
        }

        .price {
            color: #00ff99;
            font-weight: bold;
        }

        button {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: none;
            border-radius: 5px;
            background: white;
            cursor: pointer;
        }

        button:hover {
            background: #00ff99;
        }

        /* CART BOX */
        .cartBox {
            position: fixed;
            right: 10px;
            top: 70px;
            background: #111;
            padding: 10px;
            width: 200px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="header">
    <div class="logo">DMZ COUTURE</div>
    <div class="cart">🛒 <span id="cartCount">0</span></div>
</div>

<div class="hero">
    <h1>Luxury Streetwear Store</h1>
    <p>Limited Drops • Premium Fashion • DMZ Couture</p>
</div>

<div class="search">
    <input type="text" id="search" onkeyup="searchProducts()" placeholder="Search products...">
</div>

<div class="products" id="productList"></div>

<div class="cartBox">
    <h3>Cart</h3>
    <div id="cartItems">Empty</div>
</div>

<script>
let cart = [];
let products = [
    "Luxury Hoodie - ₦25,000",
    "Street Tee - ₦10,000",
    "Designer Cap - ₦7,000",
    "Premium Jeans - ₦18,000",
    "Oversized Hoodie - ₦30,000",
    "DMZ Jacket - ₦40,000",
    "Cargo Pants - ₦22,000",
    "Luxury Polo - ₦15,000",
    "Tracksuit Set - ₦45,000",
    "Minimal Tee - ₦9,000",
    "Urban Hoodie - ₦28,000",
    "Graphic Sweatshirt - ₦27,000",
    "Street Cap - ₦8,000",
    "Black Hoodie - ₦29,000",
    "White Hoodie - ₦29,000",
    "Denim Jacket - ₦35,000",
    "Street Jacket - ₦38,000",
    "Joggers - ₦20,000",
    "Luxury Set - ₦50,000",
    "Streetwear Set - ₦42,000"
];

function loadProducts() {
    let html = "";
    products.forEach(p => {
        html += `
        <div class="card">
            <h3>${p}</h3>
            <button onclick="addToCart('${p}')">Add to Cart</button>
        </div>
        `;
    });
    document.getElementById("productList").innerHTML = html;
}

function addToCart(item) {
    cart.push(item);
    document.getElementById("cartCount").innerText = cart.length;

    let list = "";
    cart.forEach(c => {
        list += "<p>" + c + "</p>";
    });

    document.getElementById("cartItems").innerHTML = list;
}

function searchProducts() {
    let input = document.getElementById("search").value.toLowerCase();
    let cards = document.getElementsByClassName("card");

    for (let i = 0; i < cards.length; i++) {
        let text = cards[i].innerText.toLowerCase();
        cards[i].style.display = text.includes(input) ? "" : "none";
    }
}

loadProducts();
</script>

</body>
</html>
