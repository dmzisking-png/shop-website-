<!DOCTYPE html>
<html>
<head>
<title>DMZ Mart Mega Store</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f1f3f6;
}

/* TOP BAR */
.topbar{
background:#111;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 22px;
position:sticky;
top:0;
z-index:10;
}

.logo{
color:#00ff99;
font-size:26px;
font-weight:bold;
}

.cart{
background:#00ff99;
color:#111;
padding:10px 16px;
border-radius:25px;
font-weight:bold;
}

/* HERO */
.hero{
height:360px;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
font-size:44px;
font-weight:bold;
background-size:cover;
background-position:center;
animation:slide 15s infinite;
}

@keyframes slide{
0%{background-image:url('https://images.unsplash.com/photo-1607082349566-187342175e2f');}
50%{background-image:url('https://images.unsplash.com/photo-1518770660439-4636190af475');}
100%{background-image:url('https://images.unsplash.com/photo-1510557880182-3d4d3cba35a5');}
}

/* CATEGORY */
.catbar{
display:flex;
gap:12px;
overflow-x:auto;
background:white;
padding:15px;
}

.cat{
padding:14px 18px;
background:#eee;
border-radius:25px;
white-space:nowrap;
font-size:18px;
}

/* SECTION TITLE */
.section-title{
padding:18px 22px;
font-size:24px;
font-weight:bold;
}

/* GRID (DENSER LIKE JUMIA) */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
padding:20px;
}

/* CARD */
.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
height:230px;
object-fit:cover;
}

.card h3{
margin:10px;
font-size:16px;
}

.price{
margin:0 10px 12px;
color:#00a86b;
font-size:16px;
font-weight:bold;
}

/* PROMO */
.promo{
margin:20px;
padding:25px;
border-radius:15px;
background:linear-gradient(90deg,#111,#00ff99);
color:white;
font-size:22px;
text-align:center;
font-weight:bold;
}
</style>
</head>

<body>

<div class="topbar">
<div class="logo">DMZ MART</div>
<a href="cart.html" class="cart">🛒 Cart</a>
</div>

<div class="hero">
MEGA ELECTRONICS MARKETPLACE • DEALS EVERYDAY
</div>

<div class="promo">
🔥 FLASH SALE • ELECTRONICS • GAMING • HOME DEVICES
</div>

<div class="section-title">⚡ Flash Deals</div>
<div class="grid" id="flash"></div>

<div class="section-title">📱 Phones & Smart Devices</div>
<div class="grid" id="phones"></div>

<div class="section-title">💻 Laptops & Computing</div>
<div class="grid" id="laptops"></div>

<div class="section-title">🎮 Gaming & Consoles</div>
<div class="grid" id="gaming"></div>

<div class="section-title">🏠 Home Appliances</div>
<div class="grid" id="home"></div>

<div class="section-title">🔊 Audio & Accessories</div>
<div class="grid" id="audio"></div>

<script>

/* MASSIVE PRODUCT DATABASE (AUTO EXPANDS FEEL LIKE 100+) */
const products = {
flash:[
"iPhone 15 Pro","Samsung S24 Ultra","MacBook Pro M3","PS5 Console","Xbox Series X"
],
phones:[
"iPhone 14","iPhone 15","Samsung A55","Samsung S23","Google Pixel 8","Infinix Zero Ultra","Tecno Camon 30","Xiaomi 14"
],
laptops:[
"MacBook Air M2","MacBook Pro M3","Dell XPS 15","HP Envy","Lenovo Legion","Asus ROG","Acer Swift","Surface Laptop 5"
],
gaming:[
"PS5 Digital","PS5 Disc","Xbox Series S","Xbox Series X","Gaming Chair","Gaming Monitor","RGB Keyboard","Gaming Mouse"
],
home:[
"Washing Machine","Smart Fridge","Air Conditioner","Robot Vacuum","Electric Cooker","Microwave Oven","Water Dispenser","Blender"
],
audio:[
"AirPods Pro","Sony Headphones","JBL Speaker","Bose Headset","Marshall Speaker","Beats Studio","Wireless Earbuds","Soundbar"
]
};

const images=[
"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9",
"https://images.unsplash.com/photo-1517336714731-489689fd1ca8",
"https://images.unsplash.com/photo-1606813907291-d86efa9b94db",
"https://images.unsplash.com/photo-1585386959984-a41552231693",
"https://images.unsplash.com/photo-1512499617640-c2f999098c3a"
];

function render(id,list){
let box=document.getElementById(id);
list.forEach((name,i)=>{
let price=Math.floor(Math.random()*900000)+50000;
let img=images[i%images.length];

box.innerHTML+=`
<a href="product.html?name=${name}&price=${price}&img=${img}">
<div class="card">
<img src="${img}">
<h3>${name}</h3>
<div class="price">₦${price}</div>
</div>
</a>
`;
});
}

/* BUILD EVERYTHING */
render("flash",products.flash);
render("phones",products.phones);
render("laptops",products.laptops);
render("gaming",products.gaming);
render("home",products.home);
render("audio",products.audio);

</script>

</body>
</html>
