<!DOCTYPE html>
<html>
<head>
<title>DMZ Mart Pro</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f1f3f6;
}

/* TOP BAR */
.topbar{
background:#111;
color:white;
display:flex;
justify-content:space-between;
padding:15px 20px;
position:sticky;
top:0;
z-index:10;
}

.logo{
color:#00ff99;
font-weight:bold;
}

/* SEARCH */
.search{
background:white;
padding:10px;
text-align:center;
}

.search input{
width:70%;
padding:12px;
border-radius:25px;
border:1px solid #ddd;
outline:none;
}

/* CATEGORIES */
.categories{
display:flex;
gap:10px;
overflow-x:auto;
padding:10px;
background:white;
}

.cat{
padding:8px 14px;
background:#eee;
border-radius:20px;
cursor:pointer;
white-space:nowrap;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:15px;
padding:15px;
}

/* CARD */
.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
height:240px;
object-fit:cover;
}

.card h3{
margin:10px;
font-size:15px;
}

.price{
margin:0 10px 15px;
color:#00a86b;
font-weight:bold;
}

a{
text-decoration:none;
color:black;
}
</style>
</head>

<body>

<div class="topbar">
<div class="logo">DMZ MART PRO</div>
<div><a href="cart.html" style="color:white;">🛒 Cart</a></div>
</div>

<div class="search">
<input id="search" onkeyup="filter()" placeholder="Search products...">
</div>

<div class="categories">
<div class="cat" onclick="showAll()">All</div>
<div class="cat" onclick="filterCat('phone')">Phones</div>
<div class="cat" onclick="filterCat('laptop')">Laptops</div>
<div class="cat" onclick="filterCat('audio')">Audio</div>
</div>

<div class="grid" id="grid">

<!-- PHONE -->
<a class="item phone" href="product.html?name=iPhone 14 Pro&price=950000&img=https://images.unsplash.com/photo-1511707171634-5f897ff02aa9&color=Black">
<div class="card">
<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">
<h3>iPhone 14 Pro</h3>
<div class="price">₦950,000</div>
</div>
</a>

<!-- LAPTOP -->
<a class="item laptop" href="product.html?name=MacBook Pro&price=1500000&img=https://images.unsplash.com/photo-1517336714731-489689fd1ca8&color=Gray">
<div class="card">
<img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8">
<h3>MacBook Pro</h3>
<div class="price">₦1,500,000</div>
</div>
</a>

<!-- AUDIO -->
<a class="item audio" href="product.html?name=AirPods Pro&price=180000&img=https://images.unsplash.com/photo-1585386959984-a41552231693&color=White">
<div class="card">
<img src="https://images.unsplash.com/photo-1585386959984-a41552231693">
<h3>AirPods Pro</h3>
<div class="price">₦180,000</div>
</div>
</a>

</div>

<script>
function filter(){
let input=document.getElementById("search").value.toLowerCase();
let items=document.querySelectorAll(".item");

items.forEach(i=>{
let text=i.innerText.toLowerCase();
i.style.display=text.includes(input)?"block":"none";
});
}

function filterCat(cat){
let items=document.querySelectorAll(".item");

items.forEach(i=>{
i.style.display=i.classList.contains(cat)?"block":"none";
});
}

function showAll(){
document.querySelectorAll(".item").forEach(i=>i.style.display="block");
}
</script>

</body>
</html>
