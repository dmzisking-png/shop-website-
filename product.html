<!DOCTYPE html>
<html>
<head>
<title>Product</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
text-align:center;
}

.box{
background:white;
max-width:700px;
margin:40px auto;
padding:20px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

img{
width:100%;
height:350px;
object-fit:cover;
border-radius:10px;
}

.price{
color:#00a86b;
font-size:24px;
margin:10px 0;
}

button{
padding:12px 20px;
background:#111;
color:white;
border:none;
border-radius:20px;
cursor:pointer;
margin:10px;
}

button:hover{
background:#00a86b;
}

a{
display:block;
margin-top:15px;
color:#00a86b;
text-decoration:none;
}
</style>
</head>

<body>

<div class="box">

<img id="img">
<h2 id="name"></h2>
<div class="price" id="price"></div>

<button onclick="addToCart()">Add to Cart</button>
<button onclick="goCart()">Go to Cart</button>

<a href="index.html">← Back to Store</a>

</div>

<script>
const p = new URLSearchParams(window.location.search);

let name = p.get("name");
let price = p.get("price");
let img = p.get("img");

document.getElementById("name").innerText = name;
document.getElementById("price").innerText = "₦" + price;
document.getElementById("img").src = img;

function addToCart(){
let cart = JSON.parse(localStorage.getItem("cart")) || [];

cart.push({
name:name,
price:price
});

localStorage.setItem("cart", JSON.stringify(cart));

alert("Added to cart!");
}

function goCart(){
window.location.href = "cart.html";
}
</script>

</body>
</html>
