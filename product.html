<!DOCTYPE html>
<html>
<head>
<title>Product</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f1f3f6;
}

.container{
max-width:900px;
margin:30px auto;
background:white;
padding:20px;
display:flex;
gap:20px;
border-radius:10px;
}

img{
width:350px;
border-radius:10px;
}

.price{
color:#00a86b;
font-size:24px;
}

button{
padding:12px;
background:#111;
color:white;
border:none;
border-radius:20px;
width:100%;
cursor:pointer;
}

button:hover{
background:#00a86b;
}
</style>
</head>

<body>

<div class="container">

<img id="img">

<div>
<h2 id="name"></h2>
<div class="price" id="price"></div>

<select id="color">
<option>Black</option>
<option>White</option>
<option>Blue</option>
</select>

<button onclick="add()">Add to Cart</button>
</div>

</div>

<script>
let p=new URLSearchParams(window.location.search);

let name=p.get("name");
let price=p.get("price");
let img=p.get("img");

document.getElementById("name").innerText=name;
document.getElementById("price").innerText="₦"+price;
document.getElementById("img").src=img;

function add(){
let cart=JSON.parse(localStorage.getItem("cart"))||[];

cart.push({
name:name,
price:price,
color:document.getElementById("color").value
});

localStorage.setItem("cart",JSON.stringify(cart));

alert("Added!");
}
</script>

</body>
</html>
