<!DOCTYPE html>
<html>
<head>
<title>Product</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f1f3f6;
}

.box{
max-width:900px;
margin:40px auto;
background:white;
padding:20px;
display:flex;
gap:20px;
border-radius:12px;
}

img{
width:400px;
border-radius:10px;
}

h2{
font-size:26px;
}

.price{
font-size:24px;
color:#00a86b;
margin:10px 0;
}

select,input{
padding:10px;
width:100%;
margin:8px 0;
}

button{
width:100%;
padding:12px;
background:#111;
color:white;
border:none;
border-radius:20px;
cursor:pointer;
}

button:hover{
background:#00a86b;
}
</style>
</head>

<body>

<div class="box">

<img id="img">

<div>
<h2 id="name"></h2>
<div class="price" id="price"></div>

<label>Color</label>
<select id="color">
<option>Black</option>
<option>White</option>
<option>Silver</option>
</select>

<label>Quantity</label>
<input type="number" id="qty" value="1" min="1">

<button onclick="add()">Add to Cart</button>
</div>

</div>

<script>
const p = new URLSearchParams(window.location.search);

const name = p.get("name") || "Product";
const price = p.get("price") || 0;
const img = p.get("img") || "";

document.getElementById("name").innerText = name;
document.getElementById("price").innerText = "₦" + price;
document.getElementById("img").src = img;

function add(){
let cart = JSON.parse(localStorage.getItem("cart")) || [];

cart.push({
name:name,
price:Number(price),
color:document.getElementById("color").value,
qty:Number(document.getElementById("qty").value)
});

localStorage.setItem("cart",JSON.stringify(cart));

alert("Added to cart!");
}
</script>

</body>
</html>
