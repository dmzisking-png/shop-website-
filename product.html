<!DOCTYPE html>
<html>
<head>
<title>Product</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f1f3f6;
}

.container{
max-width:1000px;
margin:40px auto;
background:white;
padding:25px;
display:flex;
gap:25px;
border-radius:15px;
}

img{
width:450px;
border-radius:10px;
}

h1{
font-size:32px;
}

.price{
font-size:28px;
color:#00a86b;
margin:10px 0;
}

select,input{
padding:12px;
width:100%;
margin:8px 0;
font-size:16px;
}

button{
width:100%;
padding:15px;
font-size:16px;
background:#111;
color:white;
border:none;
border-radius:25px;
}

button:hover{
background:#00a86b;
}

/* SUGGESTIONS */
.suggest{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:10px;
margin-top:30px;
}

.scard{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

.scard img{
width:100%;
height:150px;
object-fit:cover;
}
</style>
</head>

<body>

<div class="container">

<img id="img">

<div>
<h1 id="name"></h1>
<div class="price" id="price"></div>

<label>Color</label>
<select>
<option>Black</option>
<option>White</option>
<option>Blue</option>
</select>

<label>Storage</label>
<select>
<option>128GB</option>
<option>256GB</option>
<option>512GB</option>
</select>

<button onclick="add()">Add to Cart</button>
</div>

</div>

<h2 style="margin:20px;">You may also like</h2>
<div class="suggest" id="suggest"></div>

<script>
let p=new URLSearchParams(window.location.search);

let name=p.get("name");
let price=p.get("price");
let img=p.get("img");

document.getElementById("name").innerText=name;
document.getElementById("price").innerText="₦"+price;
document.getElementById("img").src=img;

function add(){
let cart=JSON.parse(localStorage.getItem("cart"))||[];
cart.push({name,price});
localStorage.setItem("cart",JSON.stringify(cart));
alert("Added!");
}

// suggestions
let sample=[
{name:"Gaming Laptop",img:img},
{name:"Smart TV",img:img},
{name:"AirPods",img:img}
];

let box=document.getElementById("suggest");

sample.forEach(s=>{
box.innerHTML+=`
<div class="scard">
<img src="${s.img}">
<h3>${s.name}</h3>
</div>
`;
});
</script>

</body>
</html>
