<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMZ Mart - Product</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
    </style>
</head>
<body class="bg-gray-50">

    <div class="max-w-6xl mx-auto px-4 py-8">
        <a href="index.html" class="flex items-center gap-2 text-orange-600 mb-8 hover:text-orange-700">
            <i class="fas fa-arrow-left"></i> Back to DMZ Mart
        </a>

        <div class="grid md:grid-cols-2 gap-12">
            <div>
                <img id="productImg" class="w-full rounded-3xl shadow-xl" alt="Product">
            </div>

            <div>
                <h1 id="productName" class="text-4xl font-bold"></h1>
                <p id="productPrice" class="text-4xl font-bold text-orange-600 mt-6"></p>

                <div class="mt-10">
                    <h3 class="font-semibold mb-3">Description</h3>
                    <p id="productDesc" class="text-gray-600 leading-relaxed"></p>
                </div>

                <button onclick="addToCart()" 
                    class="mt-12 w-full bg-orange-600 hover:bg-orange-700 text-white py-5 rounded-3xl text-xl font-semibold">
                    Add to Cart
                </button>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');

        const productData = {
            "a35": { name: "Samsung Galaxy A35 5G", price: 148000, img: "https://i.postimg.cc/XqXKd8HW/IMG-1749.jpg", desc: "Great performance and camera." },
            "s24": { name: "Samsung Galaxy S24 Ultra", price: 875000, img: "https://i.postimg.cc/q7PXyyfp/IMG-1757.jpg", desc: "Premium flagship phone." },
            "nike": { name: "Nike Dunk Low", price: 42500, img: "https://i.postimg.cc/wj091QmD/IMG-1762.jpg", desc: "Iconic sneakers." }
        };

        const p = productData[id] || productData["a35"];

        document.getElementById('productName').textContent = p.name;
        document.getElementById('productPrice').textContent = "₦" + p.price.toLocaleString();
        document.getElementById('productImg').src = p.img;
        document.getElementById('productDesc').textContent = p.desc;

        function addToCart() {
            alert(p.name + " added to cart!");
        }
    </script>
</body>
</html>
