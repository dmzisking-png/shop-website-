<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMZ Mart - Product</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">

    <div class="max-w-6xl mx-auto px-4 py-8">
        <a href="index.html" class="flex items-center gap-2 text-orange-600 mb-8 hover:text-orange-700">
            <i class="fas fa-arrow-left"></i> Back to Shop
        </a>

        <div class="grid md:grid-cols-2 gap-12">
            <div>
                <img id="productImg" class="w-full rounded-3xl shadow-xl" alt="">
            </div>

            <div>
                <h1 id="productName" class="text-4xl font-bold"></h1>
                <p id="productPrice" class="text-4xl font-bold text-orange-600 mt-4"></p>

                <div class="mt-8">
                    <h3 class="font-semibold mb-2">Description</h3>
                    <p id="productDesc" class="text-gray-600"></p>
                </div>

                <button onclick="addToCart()" 
                    class="mt-12 w-full bg-orange-600 hover:bg-orange-700 text-white py-5 rounded-3xl text-xl font-semibold">
                    Add to Cart
                </button>
            </div>
        </div>
    </div>

    <script>
        // Sample product database
        const products = {
            "a35": {
                name: "Samsung Galaxy A35 5G",
                price: 148000,
                img: "https://i.postimg.cc/XqXKd8HW/IMG-1749.jpg",
                desc: "Excellent mid-range phone with great camera and battery."
            },
            "s24": {
                name: "Samsung Galaxy S24 Ultra",
                price: 875000,
                img: "https://i.postimg.cc/q7PXyyfp/IMG-1757.jpg",
                desc: "Flagship smartphone with premium features."
            },
            "nike": {
                name: "Nike Dunk Low",
                price: 42500,
                img: "https://i.postimg.cc/wj091QmD/IMG-1762.jpg",
                desc: "Classic and comfortable sneakers."
            }
            // Add more products here as needed
        };

        // Get product from URL (example: product.html?id=a35)
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id') || "a35"; // default

        const product = products[productId];

        if (product) {
            document.getElementById('productName').textContent = product.name;
            document.getElementById('productPrice').textContent = "₦" + product.price.toLocaleString();
            document.getElementById('productImg').src = product.img;
            document.getElementById('productDesc').textContent = product.desc;
        }

        function addToCart() {
            alert("✅ " + product.name + " added to cart!");
        }
    </script>
</body>
</html>
