<!DOCTYPE html>
<html>
<head>
<title>Product</title>

<style>
body{
font-family:Arial;
background:#f1f3f6;
margin:0;
}

.container{
max-width:850px;
margin:30px auto;
background:white;
padding:20px;
display:flex;
gap:20px;
border-radius:12px;
}

img{
width:350px;
border-radius:10px;
}

.details{
flex:1;
}

.price{
color:#00a86b;
font-size:22px;
margin:10px 0;
}

select,input{
padding:10px;
margin:8px 0;
width:100%;
}

button{
padding:12px;
width:100%;
background:#111;
color:white;
border:none;
border-radius:20px;
cursor:pointer;
}

button:hover{
background:#00a86b;
}
</style>
</head>

<body>

<div class="container">

<img id="img">

<div class="details">
<h2 id="name"></h2>
<div class="price" id="price"></div>

<label>Color</label>
<select id="color">
<option>Black</option>
<option>White</option>
<option>Blue</option>
</select>

<label>Quantity</label>
<input type="number" id="qty" value="1" min="1">

<button onclick="add()">Add to Cart</button>

<br><br>
<a href="index.html">← Back</a>
</div>

</div>

<script>
const p=new URLSearchParams(window.location.search);

let name=p.get("name");
let price=p.get("price");
let img=p.get("img");

document.getElementById("name").innerText=name;
document.getElementById("price").innerText="₦"+price;
document.getElementById("img").src=img;

function add(){
let cart=JSON.parse(localStorage.getItem("cart"))||[];

cart.push({
name:name,
price:Number(price),
color:document.getElementById("color").value,
qty:Number(document.getElementById("qty").value)
});

localStorage.setItem("cart",JSON.stringify(cart));

alert("Added!");
}
</script>

</body>
</html>
