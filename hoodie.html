<!DOCTYPE html>
<html>
<head>
<title>Product</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f2f2f2;
color:#111;
text-align:center;
}

.container{
padding:80px 20px;
animation:fade 0.8s ease;
}

img{
width:320px;
border-radius:15px;
box-shadow:0 15px 35px rgba(0,0,0,0.2);
transition:0.3s;
}

img:hover{
transform:scale(1.05);
}

.price{
font-size:22px;
color:#00aa66;
margin:10px 0;
}

button{
padding:14px 30px;
border:none;
margin-top:20px;
cursor:pointer;
background:#111;
color:white;
border-radius:25px;
transition:0.3s;
}

button:hover{
background:#00aa66;
}

a{
display:block;
margin-top:20px;
color:#00aa66;
text-decoration:none;
}

@keyframes fade{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">

<h1>Luxury Hoodie</h1>

<img src="hoodie.jpg">

<div class="price">₦25,000</div>

<p>Premium DMZ Couture hoodie made for modern streetwear culture.</p>

<button onclick="addToCart('Luxury Hoodie',25000)">Add to Cart</button>

<a href="index.html">← Back to Store</a>

</div>

<script>
function addToCart(name,price){
let cart = JSON.parse(localStorage.getItem("cart")) || [];
cart.push({name,price});
localStorage.setItem("cart",JSON.stringify(cart));
alert("Added to cart");
}
</script>

</body>
</html>
