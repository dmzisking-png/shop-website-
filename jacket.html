<!DOCTYPE html>
<html>
<head>
<title>DMZ Jacket</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f0f0f,#111827);
color:white;
text-align:center;
}

.box{padding:70px 20px;animation:fade 1s ease;}

img{
width:270px;
border-radius:18px;
transition:0.4s;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

img:hover{transform:scale(1.08);}

h1{font-size:40px;}

.price{color:#00ff99;font-size:22px;}

button{
padding:12px 28px;
border:none;
margin-top:20px;
cursor:pointer;
background:linear-gradient(90deg,#00ff99,#00c2ff);
color:black;
font-weight:bold;
border-radius:25px;
}

button:hover{transform:scale(1.1);}

a{display:block;margin-top:20px;color:#00ff99;text-decoration:none;}

@keyframes fade{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<div class="box">
<h1>DMZ Jacket</h1>
<img src="jacket.jpg">
<p class="price">₦40,000</p>
<p>Premium luxury streetwear jacket from DMZ Couture.</p>
<button>Add to Cart</button>
<a href="index.html">← Back to Store</a>
</div>

</body>
</html>
