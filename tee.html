<!DOCTYPE html>
<html>
<head>
<title>Street Tee</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#111,#1a1a1a);
color:white;
text-align:center;
}

.container{
padding:80px 20px;
animation:fade 1s ease;
}

img{
width:300px;
border-radius:20px;
transition:0.4s;
box-shadow:0 15px 40px rgba(0,0,0,0.5);
}

img:hover{
transform:scale(1.1) rotate(-2deg);
}

.price{
color:#00ff99;
font-size:22px;
margin:10px 0;
}

button{
padding:14px 30px;
border:none;
margin-top:20px;
cursor:pointer;
background:linear-gradient(90deg,#00ff99,#00c2ff);
color:black;
font-weight:bold;
border-radius:30px;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
letter-spacing:1px;
}

a{
display:block;
margin-top:25px;
color:#00ff99;
text-decoration:none;
}

@keyframes fade{
from{opacity:0;transform:translateY(40px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">

<h1>Street Tee</h1>

<img src="tee.jpg">

<div class="price">₦10,000</div>

<p>Minimal luxury streetwear tee designed for everyday drip.</p>

<button>Add to Cart</button>

<a href="index.html">← Back to Store</a>

</div>

</body>
</html>
