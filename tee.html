<!DOCTYPE html>
<html>
<head>
    <title>Street Tee</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f0f0f;
            color: white;
            text-align: center;
        }

        .box {
            padding: 60px 20px;
            animation: fadeIn 1.5s ease;
        }

        img {
            width: 260px;
            border-radius: 15px;
            transition: 0.3s;
        }

        img:hover {
            transform: scale(1.1);
        }

        button {
            padding: 12px 25px;
            border: none;
            margin-top: 20px;
            cursor: pointer;
            background: white;
            transition: 0.3s;
        }

        button:hover {
            background: #00ff99;
            transform: scale(1.1);
        }

        a {
            color: #00ff99;
            display: block;
            margin-top: 20px;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(30px);}
            to {opacity: 1; transform: translateY(0);}
        }
    </style>
</head>

<body>

<div class="box">

    <h1>Street Tee</h1>

    <img src="tee.jpg">

    <h2>₦10,000</h2>

    <p>Minimal luxury streetwear tee from DMZ Couture.</p>

    <button>Add to Cart</button>

    <a href="index.html">← Back to Store</a>

</div>

</body>
</html>
